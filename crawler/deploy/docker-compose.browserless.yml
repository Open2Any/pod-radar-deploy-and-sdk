# 无头浏览器(browserless / headless Chromium over CDP)——只给爬虫系统的
# 商品图 harvest worker 用,和主 compose 解耦,单独起停:
#   docker compose -f docker-compose.browserless.yml up -d
#   docker compose -f docker-compose.browserless.yml down
#
# 商品图(hm104 effect_image)是 hihumbird 前端 WebGL 客户端渲染的,不是静态文件。
# harvest worker 通过 CDP 驱动这个浏览器,在已登录的 SPA 里按批次日期翻页显示产品,
# 触发客户端渲染+上传到网关;之后爬虫用 obsUrl 把渲染好的全图下载入库。
# 连接:ws://127.0.0.1:3010?token=<BROWSERLESS_TOKEN>(见 CRAWLER_BROWSERLESS_WS)。
services:
  browserless:
    image: ghcr.io/browserless/chromium:v2.49.0
    container_name: pod-radar_browserless
    init: true
    restart: unless-stopped
    shm_size: 4gb
    ports:
      - "127.0.0.1:3010:3000"
    environment:
      TOKEN: ${BROWSERLESS_TOKEN:-pod-radar-browserless}
      # 并发会话数 / 单会话超时(ms,渲染翻页可能较久)。
      CONCURRENT: "${BROWSERLESS_CONCURRENT:-3}"
      TIMEOUT: "${BROWSERLESS_TIMEOUT:-600000}"
      CORS: "true"
      EXIT_ON_HEALTH_FAILURE: "true"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf \"http://localhost:3000/pressure?token=$${TOKEN}\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

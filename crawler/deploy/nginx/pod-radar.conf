map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}


upstream pod_radar_crawler_web {
    server 127.0.0.1:5175;
}

upstream pod_radar_crawler_api {
    server 127.0.0.1:3002;
}

server {
    server_name crawler.snexpod.cn;

    client_max_body_size 100m;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # Crawler backend API, used by crawler-web. /crawler-api/<route> maps onto the
    # versioned backend contract /api/v1/<route> (frontend + SDK unified on v1).
    location /crawler-api/ {
        proxy_pass http://pod_radar_crawler_api/api/v1/;
    }

    # Crawler Next.js assets for standalone-domain builds.
    location /_next/ {
        proxy_pass http://pod_radar_crawler_web/_next/;
    }

    # Compatibility for older images built with CRAWLER_ASSET_PREFIX=/crawler.
    location /crawler/_next/ {
        proxy_pass http://pod_radar_crawler_web/_next/;
    }

    # Crawler UI. Root redirects to the crawler app route.
    location = / {
        return 302 /crawler;
    }

    location = /crawler {
        proxy_pass http://pod_radar_crawler_web/crawler;
    }

    location /crawler/ {
        proxy_pass http://pod_radar_crawler_web/crawler/;
    }

    location / {
        proxy_pass http://pod_radar_crawler_web/crawler;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/crawler.snexpod.cn/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/crawler.snexpod.cn/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

server {
    if ($host = crawler.snexpod.cn) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name crawler.snexpod.cn;
    return 404; # managed by Certbot
}
